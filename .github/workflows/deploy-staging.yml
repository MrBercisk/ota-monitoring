name: Deploy ke Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Vite
        run: |
          npm ci
          npm run build

      - name: Upload build ke staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 45022
          source: "public/build"
          target: "~/public_html/ota-monitoring-dev"

      - name: SSH Deploy ke Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 45022
          script: |
            echo "===== STAGING DEPLOY ====="
            cd ~/public_html/ota-monitoring-dev || exit 1
            git fetch origin
            git reset --hard origin/dev
            if [ ! -f .env ]; then
              echo "ERROR: .env tidak ditemukan!" && exit 1
            fi
            composer install --no-dev --optimize-autoloader
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force
            if [ ! -L public/storage ]; then
              php artisan storage:link
            fi
            chmod -R 775 storage bootstrap/cache
            echo "===== STAGING SELESAI ====="